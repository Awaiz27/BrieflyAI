name: BrieflyAI
services:
  db:
    image: ankane/pgvector:latest
    container_name: brieflyai_postgres
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - net

  adminer:
    image: adminer
    container_name: brieflyai_adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - net

  ollama:
    image: ollama/ollama:latest
    container_name: brieflyai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    env_file:
      - ../.env
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - net

  ollama-init:
    image: ollama/ollama:latest
    container_name: brieflyai_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: /bin/sh
    command: >
      -c '
      echo "Waiting for Ollama...";
      until ollama list >/dev/null 2>&1; do sleep 2; done;
      echo "Pulling models...";
      ollama pull qwen3:0.6b-q4_K_M;
      ollama pull qwen3-embedding:0.6b-fp16;
      echo "Models ready.";
      '
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: brieflyai_rabbitmq
    env_file:
      - ../.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - net

  redis:
    image: redis:7-alpine
    container_name: brieflyai_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - net

  api:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: brieflyai_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 9001
    env_file:
      - ../.env
    environment:
      - STARTUP_ROLE=api
      - POSTGRES_HOST=db
      - MODEL_BASE_URL=http://ollama:11434
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "9001:9001"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net

  celery_beat:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: brieflyai_beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      - STARTUP_ROLE=celery_beat
      - MODEL_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=db
      - POSTGRES_USE_NULL_POOL=true
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net

  celery_worker_io:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: brieflyai_worker_io
    command: celery -A app.worker.celery_app worker --queues=io --concurrency=4 --loglevel=info
    env_file:
      - ../.env
    environment:
      - STARTUP_ROLE=celery_worker_io
      - MODEL_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=db
      - POSTGRES_USE_NULL_POOL=true
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    networks:
      - net

  celery_worker_cpu:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: brieflyai_worker_cpu
    command: celery -A app.worker.celery_app worker --queues=cpu --concurrency=1 --max-tasks-per-child=1 --loglevel=info
    env_file:
      - ../.env
    environment:
      - STARTUP_ROLE=celery_worker_cpu
      - MODEL_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=db
      - POSTGRES_USE_NULL_POOL=true
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    networks:
      - net

  frontend:
    build:
      context: ../frontend
      args:
        API_URL: http://api:9001
    container_name: brieflyai_frontend
    environment:
      - API_URL=http://api:9001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - net

networks:
  net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  rabbitmq_data:
  redis_data:
